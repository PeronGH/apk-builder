name: Bump submodules

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      before: ${{ steps.bump.outputs.before }}
      after: ${{ steps.bump.outputs.after }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - id: bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          before="$(git rev-parse HEAD)"
          echo "before=$before" >>"$GITHUB_OUTPUT"

          for sub in apps/*/source; do
              name="$(basename "$(dirname "$sub")")"
              git submodule update --remote "$sub"
              if git diff --quiet -- "$sub"; then
                  continue
              fi
              git add "$sub"
              git commit -m "chore: bump $name"
          done

          if [ "$(git rev-parse HEAD)" = "$before" ]; then
              echo "no bumps"
              echo "bumped=false" >>"$GITHUB_OUTPUT"
              exit 0
          fi

          git push
          echo "bumped=true" >>"$GITHUB_OUTPUT"
          echo "after=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

  build:
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    uses: ./.github/workflows/build.yml
    with:
      before: ${{ needs.bump.outputs.before }}
      sha: ${{ needs.bump.outputs.after }}
    secrets: inherit
