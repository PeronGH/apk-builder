name: Build changed apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:
    inputs:
      app:
        description: Build only this app (empty = all)
        required: false

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT: ${{ github.event_name }}
          APP_INPUT: ${{ github.event.inputs.app }}
        run: |
          set -euo pipefail
          declare -a changed=()
          for dir in apps/*/; do
              name="$(basename "$dir")"
              if [ "$EVENT" = "workflow_dispatch" ]; then
                  if [ -n "${APP_INPUT:-}" ] && [ "$APP_INPUT" != "$name" ]; then
                      continue
                  fi
                  changed+=("$name")
                  continue
              fi
              if [ -x "$dir/changed.sh" ] && BEFORE_SHA="$BEFORE_SHA" "$dir/changed.sh"; then
                  changed+=("$name")
              fi
          done
          printf 'changed: %s\n' "${changed[@]:-<none>}"
          json=$(printf '%s\n' "${changed[@]:-}" | jq -R . | jq -sc '[.[] | select(length > 0)]')
          echo "apps=$json" >>"$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Build
        id: build
        run: |
          set -euo pipefail
          apks_file="$RUNNER_TEMP/apks.txt"
          "apps/${{ matrix.app }}/build.sh" >"$apks_file"
          echo "apks_file=$apks_file" >>"$GITHUB_OUTPUT"
          cat "$apks_file"

      - name: Sign
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          mapfile -t apks <"${{ steps.build.outputs.apks_file }}"
          builder/sign-apks.sh "${apks[@]}"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t apks <"${{ steps.build.outputs.apks_file }}"
          hash=$(git -C "apps/${{ matrix.app }}/source" rev-parse --short HEAD)
          tag="${{ matrix.app }}-$hash"
          gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --notes "Build of ${{ matrix.app }}@$hash" \
              "${apks[@]}"
